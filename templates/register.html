{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Sign Up | ContentEngine</title>
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      body {
        background-color: #0f172a;
        background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: #f8fafc;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }

      .auth-card {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .text-gradient {
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .btn-custom-primary {
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        border: none;
        color: white;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .btn-custom-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        color: white;
      }

      /* Styling the automatic Django form inputs for Dark Mode */
      input,
      select {
        background-color: rgba(15, 23, 42, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
      }

      input:focus,
      select:focus {
        border-color: #38bdf8 !important;
        box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.15) !important;
      }

      label {
        color: #94a3b8;
        font-weight: 500;
        margin-bottom: 0.5rem;
        margin-top: 0.5rem;
      }

      /* Styling Django's built-in error and help text */
      .helptext {
        display: block;
        font-size: 0.8rem;
        color: #64748b;
        margin-top: 0.25rem;
      }

      .errorlist {
        color: #ef4444;
        list-style: none;
        padding-left: 0;
        font-size: 0.875rem;
        margin-bottom: 0;
        margin-top: 0.25rem;
        font-weight: 500;
      }
    </style>
  </head>
  <body class="d-flex align-items-center min-vh-100 py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
          <div class="text-center mb-4">
            <a
              href="{% url 'home' %}"
              class="text-decoration-none text-white fs-2 fw-bold"
            >
              <i class="bi bi-braces text-info me-2"></i>ContentEngine
            </a>
          </div>

          <div class="auth-card p-4 p-md-5">
            <h3 class="mb-3 fw-bold text-center">
              Join the <span class="text-gradient">Pipeline</span>
            </h3>
            <p class="text-center text-secondary mb-4">
              Create an account to manage your production workflow.
            </p>

            {% if form.errors %}
            <div
              class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger d-flex align-items-center mb-4"
              role="alert"
            >
              <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
              <div>Please correct the errors in the form below.</div>
            </div>
            {% endif %}

            <form method="POST">
              {% csrf_token %} {{ form }}

              <div class="d-grid mt-5">
                <button
                  type="submit"
                  class="btn btn-custom-primary btn-lg fw-bold rounded-pill"
                >
                  Create Account
                </button>
              </div>
            </form>

            <div class="text-center mt-4 pt-2">
              <small class="text-secondary">
                Already have an account?
                <a
                  href="{% url 'login' %}"
                  class="text-info text-decoration-none fw-bold"
                  >Log in here</a
                >
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
