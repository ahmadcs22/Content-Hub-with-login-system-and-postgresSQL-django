{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Delete | ContentEngine</title>
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      body {
        background-color: #0f172a;
        background-image: radial-gradient(circle at bottom, #1e1b4b, #0f172a);
        color: #f8fafc;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }

      .delete-card {
        background: #1e293b;
        border: 2px solid rgba(239, 68, 68, 0.2);
        border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      }

      .warning-icon {
        font-size: 4rem;
        color: #ef4444;
        text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        margin-bottom: 1.5rem;
      }

      .text-gradient-danger {
        background: linear-gradient(to right, #f87171, #ef4444);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .btn-danger-custom {
        background: #ef4444;
        border: none;
        color: white;
        transition: all 0.2s ease;
      }

      .btn-danger-custom:hover {
        background: #dc2626;
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
      }

      .btn-outline-custom {
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #94a3b8;
        transition: all 0.2s ease;
      }

      .btn-outline-custom:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }
    </style>
  </head>
  <body class="d-flex align-items-center min-vh-100 py-5">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          <div class="delete-card p-4 p-md-5">
            <div class="warning-icon">
              <i class="bi bi-exclamation-octagon"></i>
            </div>

            <h2 class="fw-bolder mb-3 text-gradient-danger">Are you sure?</h2>

            <p class="text-secondary fs-5 mb-2">You are about to delete:</p>
            <h4
              class="text-white fw-bold mb-4 px-3 py-2 bg-dark bg-opacity-50 rounded border border-secondary border-opacity-25"
            >
              "{{ video.title }}"
            </h4>

            <p class="text-secondary small mb-5">
              <i class="bi bi-info-circle me-1"></i> This action is permanent
              and will also remove all associated resource links.
            </p>

            <form method="POST">
              {% csrf_token %}
              <div
                class="d-flex flex-column flex-sm-row justify-content-center gap-3"
              >
                <a
                  href="{% url 'dashboard' %}"
                  class="btn btn-outline-custom px-4 py-2 rounded-pill fw-bold"
                >
                  No, Keep It
                </a>
                <button
                  type="submit"
                  class="btn btn-danger-custom px-4 py-2 rounded-pill fw-bold"
                >
                  Yes, Delete Forever
                </button>
              </div>
            </form>
          </div>

          <div class="mt-4">
            <a
              href="{% url 'dashboard' %}"
              class="text-decoration-none text-secondary small opacity-75"
            >
              <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
