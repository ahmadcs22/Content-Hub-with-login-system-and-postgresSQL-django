{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Video Idea | ContentEngine</title>
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      body {
        background-color: #0f172a;
        background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: #f8fafc;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }

      .form-card {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .text-gradient {
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .btn-custom-primary {
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        border: none;
        color: white;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .btn-custom-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        color: white;
      }

      /* Dark Mode Inputs for Text, Select, and Textareas */
      input,
      select,
      textarea {
        background-color: rgba(15, 23, 42, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        border-radius: 8px !important;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #38bdf8 !important;
        box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.15) !important;
      }

      label {
        color: #94a3b8;
        font-weight: 500;
        margin-bottom: 0.5rem;
        margin-top: 0.5rem;
      }

      .back-link {
        color: #94a3b8;
        transition: color 0.2s ease;
      }

      .back-link:hover {
        color: #f8fafc;
      }

      /* Fixing Django's default date picker icon for dark mode */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.6;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="d-flex align-items-center min-vh-100 py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7 col-xl-6">
          <div
            class="d-flex justify-content-between align-items-center mb-4 px-2"
          >
            <h3 class="fw-bold mb-0 text-light">
              <i class="bi bi-camera-video text-info me-2"></i>New
              <span class="text-gradient">Idea</span>
            </h3>
            <a
              href="{% url 'dashboard' %}"
              class="text-decoration-none back-link fw-medium"
            >
              <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
          </div>

          <div class="form-card p-4 p-md-5">
            <p
              class="text-secondary mb-4 border-bottom border-secondary border-opacity-25 pb-3"
            >
              Log a new concept for the channel and set a target date to keep
              your content schedule on track.
            </p>

            <form method="POST">
              {% csrf_token %} {{ form.as_p }}

              <div class="d-grid mt-5">
                <button
                  type="submit"
                  class="btn btn-custom-primary btn-lg fw-bold rounded-pill"
                >
                  <i class="bi bi-plus-circle me-1"></i> Save to Pipeline
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
